name: Hashnode Blog Posts
on:
  schedule:
    # Runs every 6 hours of the day
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update this repo's README with the latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "BLOGPOSTS"
          feed_list: "https://blog.nandan.dev/rss.xml"
          template: "$newline - $randomEmoji(💯,🔥,💫,🚀,🌮) [$title]($url)"
          commit_message: "recent posts section updated"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          readme_path: ./pages/README.md
          max_post_count: 10
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "LATESTBLOG"
          feed_list: "https://blog.nandan.dev/rss.xml"
          template: '<a target="_blank" rel="noopener" href="$url">$title</a>'
          commit_message: "homepage latest post updated"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          readme_path: ./index.html
          max_post_count: 1
